<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento</title>
  <style>
    
    body { 
        font-family: Arial, sans-serif; 
        padding: 20px; 
        background: #f9f9f9; 
    }
    .container { 
        max-width: 500px; 
        margin: auto; 
        background: #fff; 
        padding: 20px; 
        border-radius: 10px; 
    }
    label { 
        
        display: block; 
        
        margin-top: 15px; 
    
    }
    input, select { 
        width: 100%; 
        padding: 10px; 
        margin-top: 5px; 
        border: 1px solid #ccc; 
        border-radius: 5px; 
    }
    button { 
        margin-top: 20px; 
        width: 100%; 
        padding: 10px; 
        background: #28a745; 
        color: #fff; 
        border: none; 
        border-radius: 5px; 
        cursor: pointer; 
    }
  </style>
</head>
<body>
  <div class="container">
    <form action="/salvarCard" method="POST">
      <h2>Pagamento</h2>
  
      <label>Nome no cartão</label>
      <input type="text" name="nome_cartao" placeholder="Ex: Matheus Geraldi" required>
  
      <label>Número do cartão</label>
      <input type="text" name="numero_cartao" placeholder="XXXX XXXX XXXX XXXX" required>
  
      <label>Data de validade</label>
      <input type="month" name="validade_cartao" required>
  
      <label>CVV</label>
      <input type="text" name="cvv" placeholder="123" required>
  
      <label>Forma de pagamento</label>
      <select name="forma_pagamento" required>
        <option>Cartão de crédito</option>
        <option>Cartão de débito</option>
      </select>
  
      <button type="submit">Salvar Cartão</button>
  </form> 
  </div>
</body>
</html>
